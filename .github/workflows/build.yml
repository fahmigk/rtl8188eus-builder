name: Build 8188eu.ko
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make bc lld llvm libssl-dev python-is-python3 wget

      - name: Get ZyC Clang
        run: |
          mkdir clang && cd clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20251111-release/Clang-15.0.7-20251111.tar.gz
          tar -xf Clang-15.0.7-20251111.tar.gz
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Clone driver
        run: git clone https://github.com/aircrack-ng/rtl8188eus -b v5.3.9

      - name: Clone kernel
        run: git clone https://github.com/AstideLabs/android_kernel_xiaomi_sm8250 -b android16-aptusitu-new --depth=1 kernel

      - name: Prepare kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- cas_defconfig
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)

      - name: Fix and build module
        run: |
          cd rtl8188eus
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KSRC=../kernel/out KCFLAGS="-Wno-error -Wno-constant-conversion -Wno-implicit-int-conversion -Wno-unknown-warning-option"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 8188eu-ko
          path: rtl8188eus/8188eu.ko
